    <style>
        body {
            margin: 0;
            border: 0;
            padding: 0;
            font-family: "Roboto", sans-serif;
        }
        .learn{
            margin-left: 5px;
            margin-right: 5px;
            position: relative;
        }
        .learn img{
            border-radius: 5px;
            position:absolute;  
            opacity: 0.8;
        }
        /* .learn_img{
            z-index:3;
        } */
        .learn_desc{
            height:100%;
            z-index: 5;
        } 
        
        .learn_desc{
            display: flex;
            justify-content: space-around;
            width: 100%;
            position:absolute;
            align-items: center;
            top:200px;
            left:5px;
        } 
        @media screen and (max-width:700px) {
             .learn , .learn img{
            height: 150px;
            animation: lern 2s linear forwards;
        }
        .learn_desc{
            display: flex;
            justify-content: space-between;
            width: 95%;
            position:absolute;
            top: 7px;
            left:5px;
            animation:learn_desc_anim 2s linear forwards;
        }
        @keyframes learn_desc_anim {
            0%{
                display: none;
            }
            75%{
                display: none;
            }
            100%{
                display: flex;
            }
        }

        .learn_desc button{
            font-size: 10px;
        }

        @keyframes lern {
            0% {
                margin-left: 5%;
                margin-right: 5%;
                width: 0px;
            }

            100% {
                margin-left: 2%;
                margin-right: 3%;
                width: 95%;
            }
        }
        }
       
    </style>
</head>
